services:
  postgres:
    image: postgres:15-alpine
    container_name: cso-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: app
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - platform_pg_data:/var/lib/postgresql/data

volumes:
  platform_pg_data:

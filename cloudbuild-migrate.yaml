steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - packages/db/Dockerfile.migrate
      - -t
      - asia-northeast3-docker.pkg.dev/cso-ai/apps/db-migrate:v2
      - packages/db
images:
  - asia-northeast3-docker.pkg.dev/cso-ai/apps/db-migrate:v2
options:
  machineType: E2_HIGHCPU_8
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
